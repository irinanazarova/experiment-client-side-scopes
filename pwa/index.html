<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <title>Demo budget</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: grid;
        place-items: center;
        -webkit-font-smoothing: antialiased;
      }

      /* A faint spreadsheet skeleton behind the loader, so it reads as the app
         already loading in rather than a blank wait. */
      .skeleton {
        position: fixed; inset: 0; z-index: 0; opacity: .55; overflow: hidden;
        background:
          repeating-linear-gradient(to right, #e9eef5 0 1px, transparent 1px 68px),
          repeating-linear-gradient(to bottom, #e9eef5 0 1px, transparent 1px 30px);
        -webkit-mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 72%, transparent);
                mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 72%, transparent);
      }
      .skeleton::before { /* header row tint */
        content: ""; position: absolute; left: 0; right: 0; top: 0; height: 30px; background: #eef2f8;
      }
      .skeleton::after { /* shimmer sweep */
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(100deg, transparent 32%, rgba(255,255,255,.65) 50%, transparent 68%);
        animation: shimmer 2.4s linear infinite;
      }
      @keyframes shimmer { from { transform: translateX(-55%); } to { transform: translateX(55%); } }

      .loader {
        position: relative; z-index: 1; width: min(92vw, 384px); padding: 1.6rem 1.8rem;
        background: rgba(248, 250, 252, .9); backdrop-filter: blur(7px);
        border: 1px solid rgba(226, 232, 240, .8); border-radius: 16px;
        box-shadow: 0 18px 48px -16px rgba(15, 23, 42, .22);
        opacity: 0; animation: fade .5s ease forwards;
      }
      @keyframes fade { to { opacity: 1; } }

      .title { font-size: 1.05rem; font-weight: 650; letter-spacing: -0.01em; }
      .lead { margin-top: .4rem; font-size: .8rem; line-height: 1.45; color: #64748b; }
      .lead.error { color: #dc2626; }

      .steps { list-style: none; margin: 1.2rem 0 0; padding: 0; }
      .steps li { display: flex; align-items: center; gap: .6rem; padding: .3rem 0; font-size: .83rem; color: #94a3b8; }
      .steps .ic { position: relative; width: 16px; height: 16px; flex: none; border: 2px solid #cbd5e1; border-radius: 50%; }
      .steps li.active { color: #0f172a; }
      .steps li.active .ic { border-color: #4f46e5; }
      .steps li.active .ic::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: #4f46e5; animation: pulse 1.05s ease-in-out infinite; }
      .steps li.done { color: #475569; }
      .steps li.done .ic { border-color: #16a34a; background: #16a34a; }
      .steps li.done .ic::after { content: "✓"; position: absolute; inset: -1px 0 0; color: #fff; font-size: 11px; line-height: 16px; text-align: center; }
      .steps .det { margin-left: auto; font-size: .74rem; color: #94a3b8; font-variant-numeric: tabular-nums; }
      @keyframes pulse { 0%, 100% { opacity: .35; transform: scale(.65); } 50% { opacity: 1; transform: scale(1); } }

      .bar { width: 100%; height: 4px; margin: 1.2rem 0 0; background: #e9edf3; border-radius: 999px; overflow: hidden; }
      .bar > i { display: block; height: 100%; width: 0; background: #4f46e5; border-radius: 999px; transition: width .35s linear; }
      .eta { margin-top: .55rem; font-size: .78rem; color: #64748b; min-height: 1.1em; font-variant-numeric: tabular-nums; }

      .retry { display: none; margin-top: 1rem; padding: .5rem 1rem; font-size: .82rem; font-weight: 550;
        border: 1px solid #cbd5e1; border-radius: 9px; background: #fff; color: #0f172a; cursor: pointer; }
      .retry:hover { border-color: #94a3b8; }

      a.diag { position: fixed; bottom: 12px; right: 14px; z-index: 2; font-size: .7rem; color: #cbd5e1; text-decoration: none; }
      a.diag:hover { color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="skeleton" aria-hidden="true"></div>
    <div class="loader" role="status" aria-live="polite">
      <div class="title">Demo budget</div>
      <div class="lead" id="lead">
        Building a real Rails app inside your browser. The first visit takes
        about 20–40&nbsp;seconds; after that it opens instantly.
      </div>
      <ul class="steps" id="steps">
        <li id="m-engine"><span class="ic"></span><span class="lbl">Loading engine</span><span class="det" id="d-engine"></span></li>
        <li id="m-data"><span class="ic"></span><span class="lbl">Syncing your spreadsheet</span><span class="det" id="d-data"></span></li>
        <li id="m-app"><span class="ic"></span><span class="lbl">Downloading app</span><span class="det" id="d-app"></span></li>
        <li id="m-rails"><span class="ic"></span><span class="lbl">Starting Rails</span><span class="det" id="d-rails"></span></li>
      </ul>
      <div class="bar"><i></i></div>
      <div class="eta" id="eta">Estimating…</div>
      <button class="retry" id="retry" type="button">Retry</button>
    </div>
    <a class="diag" href="/boot.html">diagnostics</a>
    <!-- Reviewer support notice + stale-cache reset; shown on the loader screen
         too, since Safari hangs here before the in-VM Rails takes over. -->
    <script type="module" src="/support-banner.mjs"></script>
    <script type="module" src="/loader.js"></script>
  </body>
</html>
