# Postgres (logical replication on) + ElectricSQL sync service.
# Electric reads the WAL and serves Shapes over HTTP; the browser's PGlite
# replica subscribes via @electric-sql/pglite-sync. Rails owns writes.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: client_side_scopes_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - -c
      - wal_level=logical
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/client_side_scopes_development
      # Local dev only. Production puts a Rails auth proxy in front (see Electric::Gateway).
      ELECTRIC_INSECURE: "true"
    ports:
      - "3010:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
