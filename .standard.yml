ruby_version: 3.4

ignore:
  - "bin/**/*"
  - "db/schema.rb"
  - "config/**/*"
  - "wasm_build/**/*"
  # rbwasm build artifacts (bin/rails wasmify:pack)
  - "build/**/*"
  - "rubies/**/*"
  - "pwa/**/*"
  # slice:pack uses the `mb.(x)` proc-call shorthand by preference.
  - "lib/tasks/slice.rake":
      - Style/LambdaCall
